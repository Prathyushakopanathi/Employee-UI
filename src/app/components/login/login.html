<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow p-4" style="width:350px;">
        <h2 class="text-center mb-4">Login Page</h2>

        <div class="mb-3">
            <label class="form-label">User Name</label>
            <input type="text" name="username" class="form-control" [(ngModel)]="username" placeholder="Enter username">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" [(ngModel)]="password"
                placeholder="Enter password">
        </div>
        <div class="d-flex justify-content-between mb-3">
      <button class="btn btn-primary px-4" (click)="login()">Login</button>

      <button class="btn btn-secondary px-4" (click)="forgetPassword()">
        Forget Password
      </button>
    </div>

    <!-- Register -->
    <div class="d-flex justify-content-center">
      <button
        class="btn btn-success btn-lg w-100"
        (click)="register()"
      >
        Register
      </button>
    </div>

    </div>
