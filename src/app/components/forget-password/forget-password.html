<div class="container vh-100 d-flex justify-content-center align-items-center bg-light">
  <div class="card shadow-lg p-4 rounded-4" style="width: 450px;">

    <div class="text-center mb-4">
      <div class="icon-box mb-3">
        🔒
      </div>
      <h2 class="fw-bold">Forgot Password</h2>
      <p class="text-muted">
        Enter your registered email address and we'll send you a reset link.
      </p>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Email Address</label>
      <input type="email" class="form-control form-control-lg" placeholder="Enter your email" [(ngModel)]="email"
        name="email" />
    </div>
    <button class="btn btn-primary btn-lg w-100" (click)="sendResetLink()">
      Send Reset Link
    </button>
    <div class="alert alert-info mt-4 text-center">
      We will send a password reset link to your email.
    </div>
    <div class="text-center mt-3">
      <a [routerLink]="['/']" class="text-decoration-none fw-semibold">
        ← Back to Login
      </a>
    </div>

  </div>
</div>
