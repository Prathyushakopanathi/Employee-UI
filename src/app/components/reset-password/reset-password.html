<div class="container vh-100 d-flex justify-content-center align-items-center bg-light">
  <div class="card shadow-lg p-4 rounded-4" style="width: 450px;">

    <div class="text-center mb-4">
      <div class="icon-box mb-3">
        🔑
      </div>
      <h2 class="fw-bold">Reset Password</h2>
      <p class="text-muted">
        Create a new password for your account.
      </p>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">New Password</label>
      <input
        type="password"
        class="form-control form-control-lg"
        placeholder="Enter new password"
        [(ngModel)]="newPassword"
        name="newPassword"
      />
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Confirm Password</label>
      <input
        type="password"
        class="form-control form-control-lg"
        placeholder="Confirm password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
      />
    </div>

    <button
      class="btn btn-success btn-lg w-100 mt-2"
      (click)="changePassword()"
    >
      Update Password
    </button>

    <div class="text-center mt-3">
      <a routerLink="/" class="text-decoration-none fw-semibold">
        ← Back to Login
      </a>
    </div>

  </div>
</div>
